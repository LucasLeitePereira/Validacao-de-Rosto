name: Issue Notification to Manus (HTML)

on:
  issues:
    types: [opened]

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Get issue details
        id: issue_details
        run: |
          # Extração segura de dados da issue
          echo "issue_title=$(jq -r .issue.title "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"
          echo "repo_name=$(jq -r .repository.full_name "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"
          echo "issue_url=$(jq -r .issue.html_url "$GITHUB_EVENT_PATH")" >> "$GITHUB_OUTPUT"
          
          # Corpo da issue com múltiplas linhas usando delimitadores EOF
          echo "issue_body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r .issue.body "$GITHUB_EVENT_PATH" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send HTML email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MANUS_EMAIL: ${{ secrets.MANUS_EMAIL }}
          ISSUE_TITLE: ${{ steps.issue_details.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue_details.outputs.issue_body }}
          REPO_NAME: ${{ steps.issue_details.outputs.repo_name }}
          ISSUE_URL: ${{ steps.issue_details.outputs.issue_url }}
          FROM_EMAIL: "manus-bot@lucasleitepereira.com"
        run: |
          python3 -c "
          import os, json, requests

          # Coleta todas as variáveis de ambiente necessárias
          issue_body = os.environ.get('ISSUE_BODY', '')
          issue_title = os.environ.get('ISSUE_TITLE', '')
          repo_name = os.environ.get('REPO_NAME', '')
          issue_url = os.environ.get('ISSUE_URL', '')
          manus_email = os.environ.get('MANUS_EMAIL', '')
          api_key = os.environ.get('RESEND_API_KEY', '')
          from_email = os.environ.get('FROM_EMAIL', '')

          # Montagem do conteúdo HTML
          html_content = f'''
          <html><body style=\"font-family:sans-serif;line-height:1.6;color:#333;\">
            <div style=\"max-width:600px;margin:auto;border:1px solid #eee;padding:20px;border-radius:10px;\">
              <h2 style=\"color:#2563eb;\">Nova Tarefa para Manus</h2>
              <p>Olá <strong>Manus</strong>,</p>
              <p>Uma nova issue foi detectada no GitHub e requer sua atenção.</p>
              <table style=\"width:100%;border-collapse:collapse;margin:20px 0;\">
                <tr><td style=\"padding:8px;border-bottom:1px solid #eee;\"><strong>Repositório:</strong></td><td style=\"padding:8px;border-bottom:1px solid #eee;\">{{repo_name}}</td></tr>
                <tr><td style=\"padding:8px;border-bottom:1px solid #eee;\"><strong>Título:</strong></td><td style=\"padding:8px;border-bottom:1px solid #eee;\">{{issue_title}}</td></tr>
                <tr><td style=\"padding:8px;border-bottom:1px solid #eee;\"><strong>Link:</strong></td><td style=\"padding:8px;border-bottom:1px solid #eee;\"><a href=\"{{issue_url}}\">Ver no GitHub</a></td></tr>
              </table>
              <div style=\"background:#f9fafb;padding:15px;border-left:4px solid #2563eb;margin:20px 0;\">
                <strong>Conteúdo da Issue:</strong><br>{{issue_body.replace('\\n', '<br>')}}
              </div>
              <h3 style=\"color:#111827;\">Instruções Obrigatórias:</h3>
              <ol>
                <li>Analise a issue acima.</li>
                <li>Crie uma nova <strong>branch</strong> para a solução.</li>
                <li>Abra um <strong>Pull Request</strong> linkado à issue.</li>
              </ol>
              <p style=\"font-size:0.8em;color:#666;margin-top:30px;border-top:1px solid #eee;padding-top:10px;\">Enviado automaticamente por Manus Bot via Resend.</p>
            </div>
          </body></html>
          '''

          # Payload para a API do Resend
          payload = {{
              'from': f'Manus Bot <{{from_email}}>',
              'to': [manus_email],
              'subject': f'Tarefa para Manus: Resolver Issue em {{repo_name}}',
              'html': html_content,
              'headers': {{
                  'X-Priority': '1 (Highest)',
                  'X-MSMail-Priority': 'High'
              }}
          }}

          # Execução da requisição
          r = requests.post(
              'https://api.resend.com/emails',
              headers={{'Authorization': f'Bearer {{api_key}}', 'Content-Type': 'application/json'}},
              data=json.dumps(payload)
          )
          
          print(f'Status: {{r.status_code}}')
          print(f'Response: {{r.text}}')
          
          if r.status_code not in [200, 201]:
              exit(1)
          "
