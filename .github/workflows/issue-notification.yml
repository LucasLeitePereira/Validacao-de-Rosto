name: Issue Notification to Manus (HTML)

on:
  issues:
    types: [opened]

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Get issue details
        id: issue_details
        run: |
          # Sanitização para JSON
          ISSUE_TITLE=$(jq -r .issue.title "$GITHUB_EVENT_PATH" | sed 's/"/\\"/g')
          ISSUE_BODY=$(jq -r .issue.body "$GITHUB_EVENT_PATH" | sed 's/"/\\"/g' | awk '{printf "%s\\n", $0}' ORS='')
          REPO_NAME=$(jq -r .repository.full_name "$GITHUB_EVENT_PATH")
          ISSUE_URL=$(jq -r .issue.html_url "$GITHUB_EVENT_PATH")

          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
          echo "issue_body=$ISSUE_BODY" >> "$GITHUB_OUTPUT"
          echo "repo_name=$REPO_NAME" >> "$GITHUB_OUTPUT"
          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"

      - name: Send HTML email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MANUS_EMAIL: ${{ secrets.MANUS_EMAIL }}
          ISSUE_TITLE: ${{ steps.issue_details.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue_details.outputs.issue_body }}
          REPO_NAME: ${{ steps.issue_details.outputs.repo_name }}
          ISSUE_URL: ${{ steps.issue_details.outputs.issue_url }}
        run: |
          FROM_EMAIL="manus-bot@lucasleitepereira.com"
          
          # Construção do HTML para o payload JSON
          HTML_CONTENT="<html><body style='font-family:sans-serif;line-height:1.6;color:#333;'><div style='max-width:600px;margin:auto;border:1px solid #eee;padding:20px;border-radius:10px;'><h2 style='color:#2563eb;'>Nova Tarefa para Manus</h2><p>Olá <strong>Manus</strong>,</p><p>Uma nova issue foi detectada no GitHub e requer sua atenção.</p><table style='width:100%;border-collapse:collapse;margin:20px 0;'><tr><td style='padding:8px;border-bottom:1px solid #eee;'><strong>Repositório:</strong></td><td style='padding:8px;border-bottom:1px solid #eee;'>$REPO_NAME</td></tr><tr><td style='padding:8px;border-bottom:1px solid #eee;'><strong>Título:</strong></td><td style='padding:8px;border-bottom:1px solid #eee;'>$ISSUE_TITLE</td></tr><tr><td style='padding:8px;border-bottom:1px solid #eee;'><strong>Link:</strong></td><td style='padding:8px;border-bottom:1px solid #eee;'><a href='$ISSUE_URL'>Ver no GitHub</a></td></tr></table><div style='background:#f9fafb;padding:15px;border-left:4px solid #2563eb;margin:20px 0;'><strong>Conteúdo da Issue:</strong><br>$ISSUE_BODY</div><h3 style='color:#111827;'>Instruções Obrigatórias:</h3><ol><li>Analise a issue acima.</li><li>Crie uma nova <strong>branch</strong> para a solução.</li><li>Abra um <strong>Pull Request</strong> linkado à issue.</li></ol><p style='font-size:0.8em;color:#666;margin-top:30px;border-top:1px solid #eee;padding-top:10px;'>Enviado automaticamente por Manus Bot via Resend.</p></div></body></html>"

          curl -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
                  \"from\": \"Manus Bot <$FROM_EMAIL>\",
                  \"to\": [\"$MANUS_EMAIL\"],
                  \"subject\": \"Tarefa para Manus: Resolver Issue em $REPO_NAME\",
                  \"html\": \"$HTML_CONTENT\",
                  \"headers\": {
                    \"X-Priority\": \"1 (Highest)\",
                    \"X-MSMail-Priority\": \"High\"
                  }
                }"
